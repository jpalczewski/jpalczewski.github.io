ngedCallback(){this.hydrate()}}d(y,"observedAttributes",["props"]),customElements.get("astro-island")||customElements.define("astro-island",y)}})();</script><astro-island uid="ZiY6jA" component-url="/_astro/Home.Dv47TE_g.js" component-export="default" renderer-url="/_astro/client.svelte.DGTQZZbJ.js" props="{&quot;locale&quot;:[0,&quot;en&quot;],&quot;posts&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;en/2023/08/zotero-experience&quot;],&quot;slug&quot;:[0,&quot;zotero-experience&quot;],&quot;date&quot;:[0,&quot;2023-08-29&quot;],&quot;lang&quot;:[0,&quot;en&quot;],&quot;thread&quot;:[0,&quot;meta&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;How to improve Zotero experience?&quot;],&quot;url&quot;:[0,&quot;/en/thoughts/year/2023/08/zotero-experience&quot;],&quot;excerpt&quot;:[0,&quot;It&#39;s an old note, just for archival purposes. There might be newer alternatives. Also, old blog template used another method of referencing urls, don&#39;t have it yet here, so leaving it as-is: link I...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;&lt;em&gt;It’s an old note, just for archival purposes. There might be newer alternatives. Also, old blog template used another method of referencing urls, don’t have it yet here, so leaving it as-is: &lt;a href=\&quot;%22https://beepb00p.xyz/annotating.html%22\&quot;&gt;link&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;&lt;p&gt;I have a need to share how much I love &lt;a href=\&quot;https://www.zotero.org/\&quot;&gt;Zotero&lt;/a&gt;. It was a tool that was a significant part of my academic journey and I had fallen in love while I was writing my B.Sc. thesis&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;, and all coexisting add-ons were indirectly responsible for about 50 references mentioned. I’ve recently also incorporated Zotero into my workflow alongside another side-project on Notion.&lt;/p&gt;&lt;p&gt;Other remarkable features that Zotero offers:&lt;/p&gt;&lt;ul&gt;\n&lt;li&gt;Awesome notes on existing PDFs. A bit better than &lt;a href=\&quot;https://web.hypothes.is/\&quot;&gt;hypothes.is&lt;/a&gt;&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-3\&quot; id=\&quot;user-content-fnref-3\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; what was my main driver in B.Sc. era for taking notes from PDFs.&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-4\&quot; id=\&quot;user-content-fnref-4\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;2&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;\n&lt;li&gt;Collection mechanism - it’s a bit specific approach for zotero and needs time to be used to.&lt;/li&gt;\n&lt;li&gt;Group collections that you can share your findings in teams.&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-5\&quot; id=\&quot;user-content-fnref-5\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;3&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;\n&lt;/ul&gt;&lt;p&gt;What add-ons were helpful?&lt;/p&gt;&lt;h2&gt;Firefox extension&lt;/h2&gt;&lt;p&gt;&lt;a href=\&quot;https://www.zotero.org/download/connectors\&quot;&gt;Zotero Connector for Firefox&lt;/a&gt; simplifies the process of adding new database entries. A single click can trigger metadata extraction, and in some cases, even full-text PDF retrieval.&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;h2&gt;Better Bibtex&lt;/h2&gt;&lt;p&gt;&lt;a href=\&quot;https://retorque.re/zotero-better-bibtex/\&quot;&gt;Better Bibtex&lt;/a&gt; allows exporting yours database in format compatible with Latex.&lt;/p&gt;&lt;h3&gt;Only Latex?&lt;/h3&gt;&lt;p&gt;If you need a place to take notes and mention/link your entries, &lt;a href=\&quot;https://obsidian.md/\&quot;&gt;Obsidian&lt;/a&gt; might be a good place to start. There is a great tutorial that was a great inspiration, available &lt;a href=\&quot;vhttps://medium.com/@alexandraphelan/an-academic-workflow-zotero-obsidian-56bf918d51ab\&quot;&gt;here&lt;/a&gt;.&lt;/p&gt;&lt;p&gt;There is a newer approach, however, that might work a bit better - &lt;a href=\&quot;https://github.com/PKM-er/obsidian-zotero\&quot;&gt;Obsidian Zotero Plugin&lt;/a&gt;. Haven’t tested yet.&lt;/p&gt;&lt;h2&gt;But what if I want to share my zotero-based entries with friends?&lt;/h2&gt;&lt;p&gt;Sometime tool just doesn’t suit well, and forcing others to use obsidian might be imposing useless cognitive overload, so then Notion comes into play with &lt;a href=\&quot;https://github.com/dvanoni/notero\&quot;&gt;notero&lt;/a&gt; extension. Works surprisingly smooth.&lt;/p&gt;&lt;p&gt;To wrap up, there are more efficient workflows than relying solely on a Word database or gathering references in a single designated file. And they may be integrated with your favorite applications&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Zotero&quot;],[0,&quot;Latex&quot;],[0,&quot;Notion&quot;],[0,&quot;Obsidian&quot;],[0,&quot;Sajna&quot;],[0,&quot;Note-taking&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;en/2023/08/github-page-another-repo&quot;],&quot;slug&quot;:[0,&quot;github-page-another-repo&quot;],&quot;date&quot;:[0,&quot;2023-08-17&quot;],&quot;lang&quot;:[0,&quot;en&quot;],&quot;thread&quot;:[0,&quot;meta&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Implication of deploying github page to another repo&quot;],&quot;url&quot;:[0,&quot;/en/thoughts/year/2023/08/github-page-another-repo&quot;],&quot;excerpt&quot;:[0,&quot;Be aware that it is a n old post. Just reference or an inspiration if someone is lost. Years ago I had a thought to seperate repo with hugo theme and the one with rendered page due to possible use...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;&lt;em&gt;Be aware that it is a n old post. Just reference or an inspiration if someone is lost.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Years ago I had a thought to seperate repo with hugo theme and the one with rendered page due to possible use of &lt;a href=\&quot;https://utteranc.es/\&quot;&gt;utterances&lt;/a&gt;&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;. There are my experiences with both approaches:&lt;/p&gt;&lt;h2&gt;deploying page to the same repo&lt;/h2&gt;&lt;ul&gt;\n&lt;li&gt;Astro docs provides a &lt;a href=\&quot;https://docs.astro.build/en/guides/deploy/github/\&quot;&gt;good starting point&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;&lt;h2&gt;deploying site elsewhere&lt;/h2&gt;&lt;ul&gt;\n&lt;li&gt;There is a a &lt;a href=\&quot;https://cpina.github.io/push-to-another-repository-docs/index.html\&quot;&gt;convinient github-action&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Can you reuse &lt;code&gt;withastro/action@v0&lt;/code&gt; to build it? You might, but it is designed for scenario above, this action creates an &lt;a href=\&quot;https://docs.github.com/en/actions/using-workflows/storing-workflow-data-as-artifacts\&quot;&gt;artifact&lt;/a&gt; that is consumed by &lt;code&gt;actions/deploy-pages@v1&lt;/code&gt; action.\n&lt;ul&gt;\n&lt;li&gt;tl;dr: there are better ways&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;&lt;h3&gt;Example of deploying astro blog to github pages&lt;/h3&gt;&lt;p&gt;&lt;a href=\&quot;https://github.com/jpalczewski/entuzjazm/blob/6bd91f3a1d60714ab80836c2125b2a654d3a1b63/.github/workflows/deploy.yml\&quot;&gt;There is my example&lt;/a&gt; of working github action.&lt;/p&gt;&lt;p&gt;Things worth to note:&lt;/p&gt;&lt;ul&gt;\n&lt;li&gt;By using actions to install node and pnpm there is huge time savings due to caching.&lt;/li&gt;\n&lt;li&gt;There should be a &lt;code&gt;.nojekyll&lt;/code&gt; file in blog root - otherwise css is messed up&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;\n&lt;/ul&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Astro&quot;],[0,&quot;Github&quot;],[0,&quot;CD&quot;],[0,&quot;Github-actions&quot;],[0,&quot;Devops&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}]]],&quot;threads&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;tech&quot;],&quot;label&quot;:[0,&quot;tech&quot;],&quot;full&quot;:[0,&quot;Tech / meta-blog&quot;],&quot;color&quot;:[0,&quot;#ffa64a&quot;]}],[0,{&quot;id&quot;:[0,&quot;travel&quot;],&quot;label&quot;:[0,&quot;travel&quot;],&quot;full&quot;:[0,&quot;Travel / Trains&quot;],&quot;color&quot;:[0,&quot;#ffa64a&quot;]}],[0,{&quot;id&quot;:[0,&quot;academia&quot;],&quot;label&quot;:[0,&quot;academia&quot;],&quot;full&quot;:[0,&quot;Academia / Thesis&quot;],&quot;color&quot;:[0,&quot;#ff3d8a&quot;]}],[0,{&quot;id&quot;:[0,&quot;health&quot;],&quot;label&quot;:[0,&quot;health&quot;],&quot;full&quot;:[0,&quot;Health / Stroke&quot;],&quot;color&quot;:[0,&quot;#ff3d8a&quot;]}],[0,{&quot;id&quot;:[0,&quot;kultura&quot;],&quot;label&quot;:[0,&quot;culture&quot;],&quot;full&quot;:[0,&quot;Culture / Arts&quot;],&quot;color&quot;:[0,&quot;#4ad9d9&quot;]}],[0,{&quot;id&quot;:[0,&quot;protipy&quot;],&quot;label&quot;:[0,&quot;protips&quot;],&quot;full&quot;:[0,&quot;Protips&quot;],&quot;color&quot;:[0,&quot;#4ad9d9&quot;]}],[0,{&quot;id&quot;:[0,&quot;rave&quot;],&quot;label&quot;:[0,&quot;rave&quot;],&quot;full&quot;:[0,&quot;Rave&quot;],&quot;color&quot;:[0,&quot;#ff3d8a&quot;]}],[0,{&quot;id&quot;:[0,&quot;meta&quot;],&quot;label&quot;:[0,&quot;meta&quot;],&quot;full&quot;:[0,&quot;Meta&quot;],&quot;color&quot;:[0,&quot;#8a8270&quot;]}]]],&quot;series&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;meta-blog&quot;],&quot;name&quot;:[0,&quot;Building this blog&quot;],&quot;thread&q
