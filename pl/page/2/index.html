kcesywnie będę poprawiał.&lt;/em&gt;&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Vibecoding&quot;],[0,&quot;Pociągi&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/12/jak-miec-multiscreen-na-azurowskim-bastionie&quot;],&quot;slug&quot;:[0,&quot;jak-miec-multiscreen-na-azurowskim-bastionie&quot;],&quot;date&quot;:[0,&quot;2025-12-08&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;tech&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Jak mieć multiscreen na Azurowskim Bastionie?&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/12/jak-miec-multiscreen-na-azurowskim-bastionie&quot;],&quot;excerpt&quot;:[0,&quot;Ostatnio dość dużo czasu spędzam na Azure - ich webowy klient działa dość topornie - na szczęście, trafiłem na rozwiązanie: az(Azure CLI) ma dodatek, który pozwala wyprowadzić RDP aby łączyć się na...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Ostatnio dość dużo czasu spędzam na Azure - ich webowy klient działa dość topornie - na szczęście, trafiłem na rozwiązanie: &lt;a href=\&quot;https://www.terminalworks.com/blog/post/2024/11/23/azure-bastion-use-of-native-client-for-windows\&quot;&gt;az(Azure CLI) ma dodatek, który pozwala wyprowadzić RDP aby łączyć się na serwer natywnym kliencie&lt;/a&gt;.&lt;/p&gt;&lt;p&gt;Warto też wspomnieć że Microsoft w swej dobroci wrzuca az jako &lt;a href=\&quot;https://learn.microsoft.com/en-us/cli/azure/install-azure-cli-windows?view=azure-cli-latest&amp;#x26;pivots=zip\&quot;&gt;zip do ściągnięcia&lt;/a&gt; - w sam raz na środowiska gdzie brakuje praw administratora&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;.&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Azure&quot;],[0,&quot;Cloud&quot;],[0,&quot;Tech&quot;],[0,&quot;Devops&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/11/roznica-miedzy-rezonansem-medycznym-wykonanym-prywatnie-a-na-nfz&quot;],&quot;slug&quot;:[0,&quot;roznica-miedzy-rezonansem-medycznym-wykonanym-prywatnie-a-na-nfz&quot;],&quot;date&quot;:[0,&quot;2025-11-17&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;meta&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Róznica między rezonansem medycznym wykonanym prywatnie, a na NFZ&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/11/roznica-miedzy-rezonansem-medycznym-wykonanym-prywatnie-a-na-nfz&quot;],&quot;excerpt&quot;:[0,&quot;Z takich zabawnych anegdot to cały czas za mną chodzi różnica w doświadczeniu między rezonansem który miałem w ramach Luxmedu, kontra  rezonansem wykonanym na fundusz zdrowia. Właściwie największą...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Z takich zabawnych anegdot to cały czas za mną chodzi różnica w doświadczeniu między rezonansem który miałem w ramach Luxmedu, kontra  rezonansem wykonanym na fundusz zdrowia.&lt;/p&gt;&lt;p&gt;Właściwie największą różnicą jest muzyka. W Luxmedzie dostajesz słuchawki, natomiast w publicznie finansowanym badaniu do dyspozycji masz najtańsze zatyczki.&lt;/p&gt;&lt;p&gt;Humorystyczny też był dla mni aspekt&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; że dopiero na tym którymś badaniu z rzędu, właśnie wykobywanym na fundusz moja głowa była przeskanowana wykrywaczem metali.  Jakby okej,  standardy diagnostyczne są mi już z doświadczenia bliskie, ale mimo te pierwsze badania było ze wszechmiar stresujące, biorąc pod uwagi że trzy czwarte badań na początku udaru były wykonywane gdy byłem niprzytomny to stres że mam w głowie jakieś rosyjskie&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;2&lt;/a&gt;&lt;/sup&gt; nożyczki. Nie ukrywam, że ten symboliczny gest przed pierwszym badaniem w Polsce byłby dość mocno uspokający.&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Udar&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/11/optymalizacja-drogi-do-katowic&quot;],&quot;slug&quot;:[0,&quot;optymalizacja-drogi-do-katowic&quot;],&quot;date&quot;:[0,&quot;2025-11-15&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;travel&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Optymalizacja drogi do Katowic&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/11/optymalizacja-drogi-do-katowic&quot;],&quot;excerpt&quot;:[0,&quot;Ten post jest literalnie tym filmem Pewnego sierpniowego dnia dostałem zaproszenie na rozmowę kwalifikacyjną do Katowic. Słysząc, że rozmowa będzie na miejscu to stwierdziłem.... ......dlaczego...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;&lt;em&gt;Ten post jest literalnie tym filmem&lt;/em&gt;&lt;/p&gt;&lt;a href=\&quot;https://youtube.com/watch?v=-cWAJR-K_Fw\&quot; class=\&quot;yt-preview\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener noreferrer\&quot;&gt;&lt;img src=\&quot;https://i.ytimg.com/vi/-cWAJR-K_Fw/hqdefault.jpg\&quot; alt=\&quot;YouTube\&quot; loading=\&quot;lazy\&quot;&gt;&lt;span class=\&quot;yt-play\&quot;&gt;▶&lt;/span&gt;&lt;/a&gt;&lt;p&gt;Pewnego sierpniowego dnia dostałem zaproszenie na rozmowę kwalifikacyjną do Katowic. Słysząc, że rozmowa będzie na miejscu to stwierdziłem…&lt;/p&gt;&lt;p&gt;…dlaczego nie?&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;p&gt;W każdym razie, parę tygodni później jestem szczególnie dumny z jednego połączenia:&lt;/p&gt;&lt;ul&gt;\n&lt;li&gt;O 20 wsiadam w pociąg regionalny do Iławy z Olsztyna Głównego&lt;/li&gt;\n&lt;li&gt;Tam przesiadam się o 21 w TLK Karpaty Bądź Ustronie&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; - czyli nocny do Krakowa&lt;/li&gt;\n&lt;li&gt;A w Krakowie EC Odra do Katowic, aby na miejscu w Katowicach być o 5 rano&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-3\&quot; id=\&quot;user-content-fnref-3\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;2&lt;/a&gt;&lt;/sup&gt;&lt;/li&gt;\n&lt;/ul&gt;&lt;p&gt;I pomyśleć, że dawno temu chciałem dużo jeździć nocnymi pociągami - do końca roku zapewne z 10 razy minimum zaliczę.&lt;/p&gt;&lt;p&gt;W każdym razie interesującą socjologicznie zmianą jest przejcie w Iławie między światami. Mimo że zazwuczaj WARS nie grzeszy nowoczesnością, to można to postrzegać za przestrzeń jakkolwiek ekskluzywną  - cena dopłaty  oscyluje w cenie zwyczajnego hostelu, ale  mimo wszystko dziwnie się wychodziło z tego pociągu, z walizkami LV, do zwyczajnego regionalnego, pełnego uczniów dojeżdżających do szkoły.&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Pociągi&quot;],[0,&quot;Podróże&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/11/w-warminsko-mazurskim-nic-sie-nie-dzieje-ale&quot;],&quot;slug&quot;:[0,&quot;w-warminsko-mazurskim-nic-sie-nie-dzieje-ale&quot;],&quot;date&quot;:[0,&quot;2025-11-15&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;protipy&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;W warmińsko-mazurskim nic sie nie dzieje, ale...&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/11/w-warminsko-mazurskim-nic-sie-nie-dzieje-ale&quot;],&quot;excerpt&quot;:[0,&quot;W te wakacje miałem dość dużą hiperfiksację związaną z podróżami[^1] na festiwale - jedna ciekawostka mi zapadła w pamięć sczególnie. Szukając alternatyw transportowych jak trafić do Holandii,...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;W te wakacje miałem dość dużą hiperfiksację związaną z podróżami&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; na festiwale - jedna ciekawostka mi zapadła w pamięć sczególnie.&lt;/p&gt;&lt;p&gt;Szukając alternatyw transportowych jak trafić do Holandii, Claude podpowiedział mi istnienie lotniska Weeze pod Duseldorfem w Niemczech - tak się składa że są tam loty z Szyman, naszego lokalnego, podolsztyńskiego lotniska - w dodatku zazwyczaj względnie tanie&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;. I z jednej strony można to traktować jako fast travel pod Holandię, czy też zachodnie Niemcy.&lt;/p&gt;&lt;p&gt;Z drugiej: to miejsce gdzie odbywa się &lt;a href=\&quot;https://www.parookaville.com/en/\&quot;&gt;Parookaville&lt;/a&gt;, dość duży festiwal muzyki elektronicznej.&lt;/p&gt;&lt;p&gt;Chciałbym akurat to wiedzieć wcześniej - korzystałbym.&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Europa&quot;],[0,&quot;Protipy&quot;],[0,&quot;Podróże&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/11/przyjdzie-informatyk-na-wydzial-humanistyczny&quot;],&quot;slug&quot;:[0,&quot;przyjdzie-informatyk-na-wydzial-humanistyczny&quot;],&quot;date&quot;:[0,&quot;2025-11-14&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;meta&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Przyjdzie informatyk na wydział humanistyczny...&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/11/przyjdzie-informatyk-na-wydzial-humanistyczny&quot;],&quot;excerpt&quot;:[0,&quot;Zaczynając pracę magisterską w realiach Wydziału Humanistycznego przyszedłem z dość fajnym bagażem - czy też doświadczeniem pisania w Zotero. Co prawda styl cytowania zgoła odmienny od tego co...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Zaczynając pracę magisterską w realiach Wydziału Humanistycznego przyszedłem z dość fajnym bagażem - czy też doświadczeniem pisania w Zotero. Co prawda styl cytowania zgoła odmienny od tego co znałem dotychczas, ale gdyby ktoś kiedyś trafił w podobnych realiach i chciał mieć fajne narzędzie do zarządzania bibliografią - czuję potrzebę napomknąć że jest styl cytowania w polskich naukach humanistycznych - jest dostępny pod &lt;a href=\&quot;http://metodyka.upjp2.edu.pl/book:zotero\&quot;&gt;tym adresem&lt;/a&gt;&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Zotero&quot;],[0,&quot;Praca Magisterska&quot;],[0,&quot;Działalność Akademicka&quot;],[0,&quot;Narzędzia&quot;]]],&quot;rel&quot;:[1,[[0,{&quot;to&quot;:[0,&quot;en/2023/08/zotero-experience&quot;],&quot;type&quot;:[0,&quot;continuation&quot;]}]]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/11/a-jak-wyglada-droga-do-budapesztu&quot;],&quot;slug&quot;:[0,&quot;a-jak-wyglada-droga-do-budapesztu&quot;],&quot;date&quot;:[0,&quot;2025-11-13&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;travel&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;A jak wygląda droga do Budapesztu?&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/11/a-jak-wyglada-droga-do-budapesztu&quot;],&quot;excerpt&quot;:[0,&quot;Wrzucając stare posty żeby jakkolwiek zapełnić nowego bloga treścią, Fajnie będzie dodać do do moich rozkmin na temat Amsterdamu, jak wygląda kwestia Budapesztu pod kątem cen transportu. Long story...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Wrzucając stare posty żeby jakkolwiek zapełnić nowego bloga treścią, Fajnie będzie dodać do do moich rozkmin na temat Amsterdamu, jak wygląda kwestia Budapesztu pod kątem cen transportu. Long story short:  we wrześniu był tam Lil Texas, więc stwierdziłem ze muszę tam być!&lt;/p&gt;&lt;p&gt;W porównaniu do horrendalnych cen transportu do Europy Zachodniej, za nocny do Budapesztu zapłaciłem około 200 zł - więcej mnie wyniósł powrotny, ponieważ przez moje niedopatrzenie dostałem pierwszą klasę kupując bilet w kasie&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;.&lt;/p&gt;&lt;p&gt;Przy okazji ciekawostka podróżnicza: Gdyby ktoś kiedyś polując na super promu miał problem z powrotem z Budapestu to można rozkminić przysiadkę w ramach jednej relacji: nie miałem powrotnych do Warszawy, ale były miejsca do Katowic – więc kupując w relacji krajowej od Katowic do Warszawy można dojechać mimo braku biletów.&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Pociągi&quot;],[0,&quot;Podróże&quot;]]],&quot;rel&quot;:[1,[[0,{&quot;to&quot;:[0,&quot;pl/2024/06/jak-wrocic-z-amsterdamu&quot;],&quot;type&quot;:[0,&quot;related&quot;]}]]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/11/uzyte-artykuy-w-trakcie-tworzenia-tego-bloga&quot;],&quot;slug&quot;:[0,&quot;uzyte-artykuy-w-trakcie-tworzenia-tego-bloga&quot;],&quot;date&quot;:[0,&quot;2025-11-13&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;meta&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Użyte artykuły w trakcie tworzenia tego bloga&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/11/uzyte-artykuy-w-trakcie-tworzenia-tego-bloga&quot;],&quot;excerpt&quot;:[0,&quot;- Szukając fajnych statystyk Perplexity podrzuciło mi Goatcounter - plus że open source i zaletą jest brak przymusu ostrzeżenia o ciasteczkach. Jak wyjdzie? Zobaczymy.&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;ul&gt;\n&lt;li&gt;Szukając fajnych statystyk Perplexity podrzuciło mi &lt;a href=\&quot;https://www.goatcounter.com/\&quot;&gt;Goatcounter&lt;/a&gt; - plus że open source i zaletą jest brak przymusu ostrzeżenia o ciasteczkach. Jak wyjdzie? Zobaczymy.&lt;/li&gt;\n&lt;/ul&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Web-dev&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2025/11/hello-world&quot;],&quot;slug&quot;:[0,&quot;hello-world&quot;],&quot;date&quot;:[0,&quot;2025-11-12&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;tech&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Hello, world&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2025/11/hello-world&quot;],&quot;excerpt&quot;:[0,&quot;Kolejne, finalne podejście do blogowania.  Styl jest od początku do końca zrobiony za pomocą vibecodingu - w duźej mierze to efekt darmowych tokenów na claude code web i zapału do skomplikowanych...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Kolejne, finalne podejście do blogowania.  Styl jest od początku do końca zrobiony za pomocą vibecodingu - w duźej mierze to efekt darmowych tokenów na claude code web i zapału do skomplikowanych inicjatyw.&lt;/p&gt;&lt;p&gt;A zapytacie&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;, dlaczego wracam nieustannie na github pages? To ma nieodmienny związek z…lękiem przed śmiercią. Jest w tym coś minimalnie kojącego, że jak kiedyś mnie zabraknie, to te miejsce bdzie trwało trochę dłużej. A infekowanie własną twórczością datasetów kolejnych modeli AI…czy to te słynne życie wieczne?&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Tech/astro&quot;],[0,&quot;Personal/projects&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2024/06/malarstwo-a-design-thinking&quot;],&quot;slug&quot;:[0,&quot;malarstwo-a-design-thinking&quot;],&quot;date&quot;:[0,&quot;2024-07-27&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;meta&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Co wspólnego ma malarstwo z design thinking&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2024/06/malarstwo-a-design-thinking&quot;],&quot;excerpt&quot;:[0,&quot;Jestem jeszcze w czasie gdy dość łapczywie przeglądam zdjęcia z podróży i teraz stwierdziłem że w ramach nasilenia prokrastynacji chcę zobaczyć o co chodzi z książką Lie like an artist - widziałem...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Jestem jeszcze w czasie gdy dość łapczywie przeglądam zdjęcia z podróży i teraz stwierdziłem że w ramach nasilenia prokrastynacji chcę zobaczyć o co chodzi z książką &lt;a href=\&quot;https://www.bispublishers.com/lie-like-an-artist.html\&quot;&gt;&lt;em&gt;Lie like an artist&lt;/em&gt;&lt;/a&gt; - widziałem ją w przymuzealnych sklepikach zarazem w trzech miastach gdzie miałem okazję zajrzeć do miejsc związanych ze sztuką.&lt;/p&gt;&lt;p&gt;Ale przypadkiem trafiłem na artykuł o tym &lt;a href=\&quot;https://www.roxinekee.com/blog/lie-like-an-artist\&quot;&gt;samym tytule&lt;/a&gt;\nz którego jeden cytat przykuł moją szczególną uwagę:&lt;/p&gt;&lt;blockquote&gt;\n&lt;p&gt;According to our tour guide, McArdle did painstaking truth-finding to produce these two paintings. He conducted countless interviews with veterans, pored through maps and sketches, probably went to these places himself.&lt;/p&gt;\n&lt;/blockquote&gt;&lt;p&gt;Mam dość luźne skojarzenie z tym jak Design thinking wygląda obecnie, gdzie wywiady pełnią tę istotną rolę czerpania informacji i tworzenia jeszcze lepszego doświadczenia użytkownika.&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Design Thinking&quot;],[0,&quot;Malarstwo&quot;],[0,&quot;Sztuka&quot;],[0,&quot;Wywiady&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2024/06/jak-wrocic-z-amsterdamu&quot;],&quot;slug&quot;:[0,&quot;jak-wrocic-z-amsterdamu&quot;],&quot;date&quot;:[0,&quot;2024-07-07&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;travel&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Jak wrócić z amsterdamu&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2024/06/jak-wrocic-z-amsterdamu&quot;],&quot;excerpt&quot;:[0,&quot;Podejmując skądinąd odważną decyzję o wyprawie na  Dominator 2024 i urozmaicając to wypadem do Amsterdamu, pozostaje jeszcze wątek jak wrócić? Warunki brzegowe Zakładam że po całym poniedziałku w...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Podejmując skądinąd odważną decyzję o wyprawie na  Dominator 2024 i urozmaicając to wypadem do Amsterdamu, pozostaje jeszcze wątek &lt;em&gt;jak wrócić?&lt;/em&gt;&lt;/p&gt;&lt;h2&gt;Warunki brzegowe&lt;/h2&gt;&lt;p&gt;Zakładam że po całym poniedziałku w Amsterdamie zaczyna się wątek powrotu - czyli do dyspozycji jest albo nocny pociąg, albo  nocleg + powrót cały dzień albo dzień przesiadkowy w innej europejskiej stolicy.&lt;/p&gt;&lt;p&gt;Wszystkie ceny są na dzień dzisiejszy, 07.07.24, planowane trochę do przodu tj. ten poniedziałek to 22.07. Ceny uwzględniają powrót do Olsztyna, gdzie aplikowalne, tam ze żniżką 37% w polskim PKP.&lt;/p&gt;&lt;h1&gt;Pociągi nocne&lt;/h1&gt;&lt;p&gt;Z tego co widzę, żeby koszty noclegu połączyć z kosztami transportu są takie opcje:&lt;/p&gt;&lt;h2&gt;Berlin&lt;/h2&gt;&lt;p&gt;Na czas tworzenia tego postu #ChatGPT  podpowiedziało mi o istnieniu &lt;a href=\&quot;https://www.europeansleeper.eu/\&quot;&gt;European Sleeper&lt;/a&gt; , czyli jakimś reboocie pociągów sypialnianych&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;. Jedyne dostępne na dziś połączenie to komfortowe kuszetki.&lt;/p&gt;&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Pozycja&lt;/th&gt;\n&lt;th&gt;EUR&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;Nocny z Amsterdamu do Berlina&lt;/td&gt;\n&lt;td&gt;159&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;&lt;h3&gt;Dlaczego Berlin to zła opcja &lt;em&gt;na ten konkretny wyjazd&lt;/em&gt;?&lt;/h3&gt;&lt;p&gt;Jakkolwiek dawien dawno chodząc po Warszawie Centralnej z pewnym rozmarzeniem spoglądałem na Berlin-Warszawa-Express zastanawiając się czy kiedykolwiek nim pojadę, to 23.07 zaczyna się remont linii RE1, przez co całość  trochę  mija się z celem - z drugiej strony jest też opcja powrotu przez Szczecin, gdzie busa jest mniej, ale..nie jestem przekonany.&lt;/p&gt;&lt;h2&gt;Praga&lt;/h2&gt;&lt;p&gt;W tym samym ES jest też możliwość dotarcia do Pragi, kolejna pozycja to EN z pragi do Warszawy i powrót z Warszawy do Olsztyna&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Pozycja&lt;/th&gt;\n&lt;th&gt;EUR&lt;/th&gt;\n&lt;th&gt;PLN&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ES&lt;/td&gt;\n&lt;td&gt;179&lt;/td&gt;\n&lt;td&gt;~767,33&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;EN Praga-Warszawa&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;196,66&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Warszawa-Olsztyn&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;16,36&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Suma&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;980,35&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;&lt;h2&gt;Monachium&lt;/h2&gt;&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Pozycja&lt;/th&gt;\n&lt;th&gt;EUR&lt;/th&gt;\n&lt;th&gt;PLN&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;EN Amsterdam-Monachium&lt;/td&gt;\n&lt;td&gt;105,50&lt;/td&gt;\n&lt;td&gt;452,25&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;EN Monachium-Warszawa&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;437,56&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Warszawa-Olsztyn&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;16,36&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Suma&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;906,17&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;&lt;h2&gt;Drezno&lt;/h2&gt;&lt;p&gt;Inspiracja z przedziaławki - podróż European Sleeperem do Drezna, stamtąd przesiadka do Zgorzelca, a stamtąd przesiadka we Wrocławiu. Szczerze? Jak spojrzałem na tą propozycję - stwierdziłem że już jestem za stary na takie zabawy.&lt;/p&gt;&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;Pozycja&lt;/th&gt;\n&lt;th&gt;EUR&lt;/th&gt;\n&lt;th&gt;PLN&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;ES&lt;/td&gt;\n&lt;td&gt;179&lt;/td&gt;\n&lt;td&gt;767,33&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Drezno - Zgorzelec&lt;/td&gt;\n&lt;td&gt;34,90&lt;/td&gt;\n&lt;td&gt;149,61&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Zgorzelec - Wrocław&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;20,40&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;Wrocław-Olsztyn&lt;/td&gt;\n&lt;td&gt;&lt;/td&gt;\n&lt;td&gt;49,77&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;&lt;h2&gt;Wiedeń&lt;/h2&gt;&lt;p&gt;Akurat te bilety na ten euronight zostały wyprzedane(a szkoda). W każdym razie intercity promo ma na tej trasie praskie ceny - około 200zł.&lt;/p&gt;&lt;h2&gt;Połączenia mieszane&lt;/h2&gt;&lt;h2&gt;Hamburg&lt;/h2&gt;&lt;p&gt;Pod rozwagę gdyby ktoś szukał inspiracji zostawiam że loty z Hamburga bywają znacznie tańsze niż z Amsterdamu - mnie odstraszyła głównie dopłata za bagaż podręczny&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-3\&quot; id=\&quot;user-content-fnref-3\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;. Jest tak blisko do Amsterdamu, że nie ma żadnych nocnych&lt;/p&gt;&lt;h2&gt;Dortmund&lt;/h2&gt;&lt;p&gt;Rozważając kiedyś wyjazd na jeden festiwal gdzie [[Ophidian]] grał, zwróciłem uwagę na to że któraś z tanich linii lotniczy miała tanie połączenie z [[Lotnisko Szymany]].  Niestety, połączenia zostały zawieszone.&lt;/p&gt;&lt;h2&gt;Eindhoven&lt;/h2&gt;&lt;p&gt;Stamtąd moja podróż się zaczynała, dlatego nie miałem ochoty za bardzo wracać&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-4\&quot; id=\&quot;user-content-fnref-4\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; - zresztą ceny biletów nie były jakieś szczególnie przystępne.&lt;/p&gt;&lt;h1&gt;Inne rozwiązania&lt;/h1&gt;&lt;h2&gt;Flixbus z Berlina&lt;/h2&gt;&lt;p&gt;Za około 200zł jest 11h powrotu autokarem do Olsztyna.&lt;/p&gt;&lt;h1&gt;Podsumowanie&lt;/h1&gt;&lt;p&gt;Zdecydowałem się na powrót przez Monachium. Muzeum BMW, duże parki i bodajże fajne muzea ze sztuką brzmią jak fajny pomysł na dzień.&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Pociągi&quot;],[0,&quot;Podróże&quot;],[0,&quot;Europa&quot;],[0,&quot;Transport&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2024/06/udar-a-alkohol&quot;],&quot;slug&quot;:[0,&quot;udar-a-alkohol&quot;],&quot;date&quot;:[0,&quot;2024-06-13&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;meta&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;Udar a alkohol&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2024/06/udar-a-alkohol&quot;],&quot;excerpt&quot;:[0,&quot;Żeby mieć trochę contentu, wrzucam stare podejścia do pisania  Przechodząc przez literaturę do pracy magisterskiej znalazłem jedną, nieoczywistą ciekawostkę: otóż małe[^1] spożycie alkoholu...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;&lt;em&gt;Żeby mieć trochę contentu, wrzucam stare podejścia do pisania&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Przechodząc przez literaturę do pracy magisterskiej znalazłem jedną, nieoczywistą ciekawostkę: otóż małe&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; spożycie alkoholu zmniejsza prawdopodobieństwo udaru krwotocznego. Na krwotoczny nie robi różnicy - natomiast picie dużo bądź w ciągach już te prawdopodobieństwo dość mocno zwiększa.&lt;/p&gt;&lt;blockquote&gt;\n&lt;p&gt;Light and moderate alcohol consumption was associated with a lower risk of ischemic stroke, whereas high and heavy drinking was associated with an increased risk;&lt;/p&gt;\n&lt;/blockquote&gt;&lt;p&gt;&lt;a href=\&quot;https://bmcmedicine.biomedcentral.com/articles/10.1186/s12916-016-0721-4\&quot;&gt;Źródło.&lt;/a&gt;&lt;/p&gt;&lt;p&gt;Oczywiście, to nie wyraża mojej opinii wobec alkoholu - tutaj bliżej mi do perspektywy Davida Nutta, autora m.in. [[Narkotyki bez paniki]] która określa alkohol mianem najbardziej szkodliwej używki&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-2\&quot; id=\&quot;user-content-fnref-2\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; - w analizie która nie patrzy tylko na koszty osobowo/zdrowotne, ale patrzy szerzej, uwzględniając też koszty społeczne danej związane z daną substancją.&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Alkohol&quot;],[0,&quot;Udar&quot;],[0,&quot;Praca magisterska&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}],[0,{&quot;id&quot;:[0,&quot;pl/2024/06/dpd-a-przesylki&quot;],&quot;slug&quot;:[0,&quot;dpd-a-przesylki&quot;],&quot;date&quot;:[0,&quot;2024-06-13&quot;],&quot;lang&quot;:[0,&quot;pl&quot;],&quot;thread&quot;:[0,&quot;protipy&quot;],&quot;kind&quot;:[0,&quot;thought&quot;],&quot;draft&quot;:[0,false],&quot;title&quot;:[0,&quot;DPD a przesyłki - jak poprawić jakość niskim kosztem?&quot;],&quot;url&quot;:[0,&quot;/pl/thoughts/year/2024/06/dpd-a-przesylki&quot;],&quot;excerpt&quot;:[0,&quot;Nie, żebym samemu miał bardzo nieprzyjemne doświadczenie ze składaniem reklamacji w DPD, dlatego ten protip przeklejam z przyjemnością:\n \n&gt;Ten magiczny \&quot;podpis\&quot;, widoczny jako odbiorca w statusie to...&quot;],&quot;bodyHtml&quot;:[0,&quot;&lt;p&gt;Nie, żebym samemu miał bardzo nieprzyjemne doświadczenie ze składaniem reklamacji w DPD, dlatego ten protip przeklejam z przyjemnością:&lt;/p&gt;&lt;blockquote&gt;\n&lt;p&gt;Ten magiczny “podpis”, widoczny jako odbiorca w statusie to przepisanie nazwiska z listu na zebrze przy zatwierdzaniu. Fizycznych podpisów kurierzy nie zbierają od czasów covida. Jeśli mirek chciał do rąk odbiorcy, mógł dopłacić DPD za usługę DRW&lt;sup&gt;&lt;a href=\&quot;#user-content-fn-1\&quot; id=\&quot;user-content-fnref-1\&quot; data-footnote-ref aria-describedby=\&quot;footnote-label\&quot;&gt;1&lt;/a&gt;&lt;/sup&gt; z pinem, wtedy kurier nie wrzuci takiej paczki za płot, bo będzie musiał wpisać pin od odbiorcy, żeby dobić ją w systemie. Ot cała magia.&lt;/p&gt;\n&lt;/blockquote&gt;&lt;p&gt;&lt;a href=\&quot;https://wykop.pl/link/7465835/dpd-przerzuca-komputer-przez-plot-niszczy-go-i-bezczelnie-odrzuca-reklamacje/komentarz/124712141/na-dodatek-w-systemie-paczka-widnieje-jako-odebrana-i-podpisana-od-paru-lat-kurierzy-nie-wymagaja-podpisow-po-prostu-paczka-laduje-gdziekolwiek-pod-ty#124712705\&quot;&gt;Źródło.&lt;/a&gt;&lt;/p&gt;&quot;],&quot;tags&quot;:[1,[[0,&quot;Typ/insight&quot;],[0,&quot;Protipy&quot;],[0,&quot;Kurierzy&quot;],[0,&quot;DPD&quot;]]],&quot;rel&quot;:[1,[]],&quot;series&quot;:[1,[]]}]]],&quot;threads&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;tech&quot;],&quot;label&q
